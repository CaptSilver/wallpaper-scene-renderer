name: Mutation Testing

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  mutation-test:
    name: Mull mutation testing
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            pkg-config \
            liblz4-dev \
            libeigen3-dev \
            libfreetype-dev \
            libgl-dev \
            libglvnd-dev \
            libvulkan-dev

      - name: Configure CMake with Mull
        run: |
          cmake -B build \
            -DBUILD_TESTS=ON \
            -DMUTATION_TESTING=ON \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build tests
        run: cmake --build build --target backend_scene_tests -j$(nproc)

      - name: Run mutation tests
        run: |
          LLVM_VERSION=$(clang --version | grep -oP 'clang version \K[0-9]+')
          build/_mull/usr/bin/mull-runner-${LLVM_VERSION} \
            --allow-surviving \
            --reporters=Elements \
            --report-name=mutation-report \
            --report-dir=. \
            build/src/Test/backend_scene_tests

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: mutation-report.*
