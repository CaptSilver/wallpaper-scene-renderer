# Mull mutation testing configuration
# https://mull.readthedocs.io/en/latest/Configuration.html

mutators:
  - cxx_arithmetic
  - cxx_comparison
  - cxx_logical

timeout: 60000  # 60 seconds per mutant — keeps audio-thread tests (WAV decoder
                # loop in WPSoundParser) and compute-heavy ops (PassCacheAlias)
                # from bucketing as spurious Timeout instead of measuring kill
                # rate.  Default 10s buckets ~40 of those incorrectly.

excludePaths:
  - .*/third_party/.*
  - .*/src/Test/.*
  - .*/nlohmann/.*
  - .*/Eigen/.*
  - .*/doctest/.*
